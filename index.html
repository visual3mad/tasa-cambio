<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasa Conversion monedas Cuba</title>
    
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f9f9f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #737373;
            --line: #e5e5e5;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card-bg: #1e1e1e;
                --text-main: #f5f5f5;
                --text-muted: #a3a3a3;
                --line: #333333;
                --shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
        }

        * { 
            box-sizing: border-box; 
            border-radius: 0 !important; /* Bordes rectos */
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 400px; }

        header { margin-bottom: 40px; text-align: left; }
        h1 { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; line-height: 1.2; text-transform: none; }
        .date { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 400; }

        .app-card {
            background: var(--card-bg);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }

        input, select { 
            width: 100%; 
            padding: 12px 0; 
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--line); 
            color: var(--text-main);
            font-size: 18px; 
            font-weight: 400;
            outline: none;
            margin-bottom: 25px;
            border-radius: 0;
        }

        .result-section { margin-top: 10px; }
        .result-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
        .result-val { font-size: 42px; font-weight: 800; color: var(--text-main); letter-spacing: -1px; }

        /* Rates Table Style */
        .rates-container { margin-top: 20px; }
        .section-title { 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--line);
            padding-bottom: 8px;
            margin-bottom: 15px;
            margin-top: 30px;
        }

        .rate-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
        }
        .rate-row:last-child { border-bottom: none; }
        
        .currency-name { font-size: 14px; font-weight: 400; color: var(--text-muted); }
        .currency-value { font-size: 16px; font-weight: 600; color: var(--text-main); }

        select { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Tasa Conversion monedas Cuba</h1>
        <div id="fecha" class="date">Sincronizando...</div>
    </header>

    <div class="app-card">
        <label>Cantidad a convertir</label>
        <input type="number" id="cantidad" placeholder="0.00" oninput="calcular()">

        <div style="display: flex; gap: 30px;">
            <div style="flex: 1;">
                <label>Moneda</label>
                <select id="moneda" onchange="calcular()">
                    <option value="eur">EUR</option>
                    <option value="usd">USD</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Tasa</label>
                <select id="mercado" onchange="calcular()">
                    <option value="oficial">OFICIAL</option>
                    <option value="informal">INFORMAL</option>
                </select>
            </div>
        </div>

        <div class="result-section">
            <div class="result-label">Total en CUP</div>
            <div id="resultado" class="result-val">0.00</div>
        </div>
    </div>

    <!-- DATOS DEBAJO -->
    <div class="rates-container">
        <div class="section-title">OFICIAL</div>
        <div class="rate-row">
            <span class="currency-name">Dólar (USD)</span>
            <span id="val-usd-ofic" class="currency-value">0.00</span>
        </div>
        <div class="rate-row">
            <span class="currency-name">Euro (EUR)</span>
            <span id="val-eur-ofic" class="currency-value">0.00</span>
        </div>

        <div class="section-title">INFORMAL</div>
        <div class="rate-row">
            <span class="currency-name">Dólar (USD)</span>
            <span id="val-usd-inf" class="currency-value">0.00</span>
        </div>
        <div class="rate-row">
            <span class="currency-name">Euro (EUR)</span>
            <span id="val-eur-inf" class="currency-value">0.00</span>
        </div>
    </div>
</div>

<script>
    let tasas = {};

    async function cargarTasas() {
        try {
            const res = await fetch('cambio.json');
            tasas = await res.json();
            localStorage.setItem('tasas_v3', JSON.stringify(tasas));
            actualizarUI();
        } catch (e) {
            tasas = JSON.parse(localStorage.getItem('tasas_v3'));
            if(tasas) actualizarUI();
        }
    }

    function actualizarUI() {
        document.getElementById('fecha').innerText = "ACTUALIZADO: " + tasas.fecha;
        document.getElementById('val-usd-ofic').innerText = tasas.oficial.usd;
        document.getElementById('val-eur-ofic').innerText = tasas.oficial.eur;
        document.getElementById('val-usd-inf').innerText = tasas.informal.usd;
        document.getElementById('val-eur-inf').innerText = tasas.informal.eur;
        calcular();
    }

    function calcular() {
        const cant = document.getElementById('cantidad').value || 0;
        const mon = document.getElementById('moneda').value;
        const merc = document.getElementById('mercado').value;

        if (tasas && tasas[merc]) {
            const valorTasa = parseFloat(tasas[merc][mon].replace(',', ''));
            const total = (parseFloat(cant) * valorTasa);
            document.getElementById('resultado').innerText = total.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    }

    cargarTasas();
</script>

</body>
</html>
