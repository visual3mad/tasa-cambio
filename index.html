<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAMBIO CUBA</title>
    
    <!-- Google Font: Inter (Elegante y minimalista) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette: Deep Blue & Light Blue */
            --bg: #ffffff;
            --surface: #f8fafc;
            --primary: #003366; /* Azul Oscuro */
            --secondary: #0070f3; /* Azul Claro */
            --text: #000000;
            --border: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #0a192f;
                --primary: #3399ff;
                --secondary: #66b2ff;
                --text: #ffffff;
                --border: #ffffff;
            }
        }

        * { 
            box-sizing: border-box; 
            border-radius: 0 !important; /* BORDE RECTO TOTAL */
            margin: 0; 
            padding: 0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .wrapper { width: 100%; max-width: 400px; border: 2px solid var(--border); padding: 20px; }

        header { border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        h1 { font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: -1px; }
        .date { font-size: 10px; opacity: 0.7; margin-top: 5px; }

        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin: 15px 0 5px; }

        input, select { 
            width: 100%; 
            padding: 12px; 
            background: var(--surface);
            border: 2px solid var(--border); 
            color: var(--text);
            font-size: 16px; 
            font-weight: 700;
            outline: none;
            margin-bottom: 10px;
        }

        .result-panel { 
            background: var(--primary); 
            color: #ffffff;
            padding: 20px; 
            margin: 20px 0;
            border: 2px solid var(--border);
        }
        .result-label { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; opacity: 0.9; }
        .result-val { font-size: 32px; font-weight: 900; }

        /* Rates Section */
        .rates-section { margin-top: 30px; }
        .rates-group { margin-bottom: 20px; }
        .group-title { 
            font-size: 12px; 
            font-weight: 900; 
            text-transform: uppercase; 
            background: var(--border); 
            color: var(--bg);
            padding: 4px 8px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .rate-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
        }
        .rate-box { 
            border: 1px solid var(--border); 
            padding: 12px;
            background: var(--surface);
        }
        .rate-name { font-size: 9px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }
        .rate-price { font-size: 16px; font-weight: 900; color: var(--secondary); }

    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>CAMBIO CUBA</h1>
        <div id="fecha" class="date">--:--</div>
    </header>

    <label>Cantidad</label>
    <input type="number" id="cantidad" placeholder="0.00" oninput="calcular()">

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Moneda</label>
            <select id="moneda" onchange="calcular()">
                <option value="eur">EUR</option>
                <option value="usd">USD</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label>Tasa</label>
            <select id="mercado" onchange="calcular()">
                <option value="oficial">OFICIAL</option>
                <option value="informal">INFORMAL</option>
            </select>
        </div>
    </div>

    <div class="result-panel">
        <div class="result-label">Total Recibido (CUP)</div>
        <div id="resultado" class="result-val">0.00</div>
    </div>

    <div class="rates-section">
        <!-- BLOQUE OFICIAL PRIMERO -->
        <div class="rates-group">
            <div class="group-title">Oficial</div>
            <div class="rate-grid">
                <div class="rate-box">
                    <div class="rate-name">USD</div>
                    <div id="val-usd-ofic" class="rate-price">0.00</div>
                </div>
                <div class="rate-box">
                    <div class="rate-name">EUR</div>
                    <div id="val-eur-ofic" class="rate-price">0.00</div>
                </div>
            </div>
        </div>

        <!-- BLOQUE INFORMAL SEGUNDO -->
        <div class="rates-group">
            <div class="group-title">Informal</div>
            <div class="rate-grid">
                <div class="rate-box">
                    <div class="rate-name">USD</div>
                    <div id="val-usd-inf" class="rate-price">0.00</div>
                </div>
                <div class="rate-box">
                    <div class="rate-name">EUR</div>
                    <div id="val-eur-inf" class="rate-price">0.00</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let tasas = {};

    async function cargarTasas() {
        try {
            const res = await fetch('cambio.json');
            tasas = await res.json();
            localStorage.setItem('tasas_cache_min', JSON.stringify(tasas));
            actualizarUI();
        } catch (e) {
            tasas = JSON.parse(localStorage.getItem('tasas_cache_min'));
            if(tasas) actualizarUI();
        }
    }

    function actualizarUI() {
        document.getElementById('fecha').innerText = "ACTUALIZADO: " + tasas.fecha.toUpperCase();
        
        // Tasas Oficiales
        document.getElementById('val-usd-ofic').innerText = tasas.oficial.usd;
        document.getElementById('val-eur-ofic').innerText = tasas.oficial.eur;
        
        // Tasas Informales
        document.getElementById('val-usd-inf').innerText = tasas.informal.usd;
        document.getElementById('val-eur-inf').innerText = tasas.informal.eur;
        
        calcular();
    }

    function calcular() {
        const cant = document.getElementById('cantidad').value || 0;
        const mon = document.getElementById('moneda').value;
        const merc = document.getElementById('mercado').value;

        if (tasas && tasas[merc]) {
            const valorTasa = parseFloat(tasas[merc][mon].replace(',', ''));
            const total = (parseFloat(cant) * valorTasa);
            document.getElementById('resultado').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    }

    cargarTasas();
</script>

</body>
</html>
