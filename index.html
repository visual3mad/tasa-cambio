<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasa de Conversion Cuba</title>
    <!-- Estilos para que parezca una App nativa -->
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 5px; }
        .date { text-align: center; color: #888; font-size: 12px; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .result-box { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; }
        .result-val { font-size: 24px; font-weight: bold; color: #007aff; }
        .footer { text-align: center; margin-top: 15px; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h2>Tasa de Conversion Cuba</h2>
    <div id="fecha" class="date">Cargando tasas...</div>

    <label>Cantidad a cambiar:</label>
    <input type="number" id="cantidad" placeholder="Ej: 100" oninput="calcular()">

    <label>Moneda:</label>
    <select id="moneda" onchange="calcular()">
        <option value="eur">Euros (€)</option>
        <option value="usd">Dólares ($)</option>
    </select>

    <label>Mercado:</label>
    <select id="mercado" onchange="calcular()">
        <option value="informal">Calle (Informal)</option>
        <option value="oficial">Banco (Oficial)</option>
    </select>

    <div class="result-box">
        <div style="font-size: 14px; color: #666;">Recibirás aproximadamente:</div>
        <div id="resultado" class="result-val">0.00 CUP</div>
    </div>

    <div class="footer">Datos sincronizados desde tu GitHub personal.</div>
</div>

<script>
    let tasas = {};

    // 1. Cargar los datos de tu propio JSON
    async function cargarTasas() {
        try {
            const res = await fetch('cambio.json');
            tasas = await res.json();
            document.getElementById('fecha').innerText = "Actualizado: " + tasas.fecha;
            // Guardar en el móvil para uso OFFLINE
            localStorage.setItem('tasas_cuba', JSON.stringify(tasas));
        } catch (e) {
            // Si no hay internet, usar los últimos guardados
            tasas = JSON.parse(localStorage.getItem('tasas_cuba'));
            if(tasas) document.getElementById('fecha').innerText = "Modo Offline - Tasas: " + tasas.fecha;
        }
    }

    // 2. Lógica de la calculadora
    function calcular() {
        const cant = document.getElementById('cantidad').value;
        const mon = document.getElementById('moneda').value;
        const merc = document.getElementById('mercado').value;

        if (tasas && tasas[merc]) {
            const tasaCero = tasas[merc][mon];
            const total = (cant * tasaCero).toLocaleString('es-ES', {minimumFractionDigits: 2});
            document.getElementById('resultado').innerText = total + " CUP";
        }
    }

    cargarTasas();
</script>

</body>
</html>
