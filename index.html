<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TASA CONVERSIÓN CUBA</title>
    
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f7f7f7;
            --card: #ffffff;
            --text: #121212;
            --muted: #808080;
            --line: #eeeeee;
            --shadow: 0 15px 45px rgba(0,0,0,0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #111111;
                --text: #ffffff;
                --muted: #888888;
                --line: #222222;
                --shadow: 0 15px 45px rgba(0,0,0,0.4);
            }
        }

        * { box-sizing: border-box; border-radius: 0 !important; margin: 0; padding: 0; border: none; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .app { width: 100%; max-width: 400px; }

        h1 { 
            font-weight: 800; 
            font-size: 22px; 
            letter-spacing: 1px; 
            text-align: center; 
            margin-bottom: 50px; 
        }

        .main-card {
            background: var(--card);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            margin-bottom: 50px;
        }

        .input-group { margin-bottom: 35px; }
        .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; display: block; }

        input { 
            width: 100%; 
            padding: 10px 0; 
            background: transparent;
            border-bottom: 1px solid var(--line); 
            color: var(--text);
            font-size: 32px; 
            font-weight: 400;
            outline: none;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 25px; }
        
        .select-wrapper { border-bottom: 1px solid var(--line); }
        
        select { 
            width: 100%; 
            padding: 12px 0; 
            background: transparent;
            color: var(--text);
            font-size: 15px; 
            font-weight: 400;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none; /* Quita flecha nativa en iOS */
        }

        .result-box { margin-top: 45px; text-align: center; }
        .result-val { font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
        .result-unit { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 20px; letter-spacing: 0.5px; }

        /* Rates Table Area */
        .rates-display { padding: 0 5px; }
        .section-header { 
            font-size: 11px; 
            font-weight: 800; 
            letter-spacing: 1.5px; 
            color: var(--muted); 
            margin-bottom: 20px;
            padding-top: 25px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
        }

        .rate-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
        }
        .rate-row:last-child { border-bottom: none; }

        .rate-info { font-size: 14px; font-weight: 400; color: var(--muted); }
        .rate-val { font-size: 16px; font-weight: 600; color: var(--text); }

        .footer-date { text-align: center; font-size: 9px; color: var(--muted); margin-top: 60px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app">
    <h1>TASA CONVERSIÓN CUBA</h1>

    <div class="main-card">
        <div class="input-group">
            <span class="label">CANTIDAD</span>
            <input type="number" id="cantidad" placeholder="0" oninput="calcular()">
        </div>

        <div class="controls">
            <div class="select-wrapper">
                <span class="label">MONEDA</span>
                <select id="moneda" onchange="calcular()">
                    <option value="eur">eur</option>
                    <option value="usd">usd</option>
                </select>
            </div>
            <div class="select-wrapper">
                <span class="label">TASA</span>
                <select id="mercado" onchange="calcular()">
                    <option value="oficial">oficial</option>
                    <option value="informal">informal</option>
                </select>
            </div>
        </div>

        <div class="result-box">
            <div id="resultado" class="result-val">0.00</div>
            <div class="result-unit">PESOS CUBANOS (CUP)</div>
        </div>
    </div>

    <div class="rates-display">
        <div class="section-header">OFICIAL</div>
        <div class="rate-row">
            <div class="rate-info">Dólar (USD)</div>
            <div id="val-usd-ofic" class="rate-val">--</div>
        </div>
        <div class="rate-row">
            <div class="rate-info">Euro (EUR)</div>
            <div id="val-eur-ofic" class="rate-val">--</div>
        </div>

        <div class="section-header">INFORMAL</div>
        <div class="rate-row">
            <div class="rate-info">Dólar (USD)</div>
            <div id="val-usd-inf" class="rate-val">--</div>
        </div>
        <div class="rate-row">
            <div class="rate-info">Euro (EUR)</div>
            <div id="val-eur-inf" class="rate-val">--</div>
        </div>
    </div>

    <div id="fecha" class="footer-date">Sincronizando...</div>
</div>

<script>
    let tasas = {};

    async function cargarTasas() {
        try {
            const res = await fetch('cambio.json');
            tasas = await res.json();
            localStorage.setItem('tasas_vfinal', JSON.stringify(tasas));
            actualizarUI();
        } catch (e) {
            tasas = JSON.parse(localStorage.getItem('tasas_vfinal'));
            if(tasas) actualizarUI();
        }
    }

    function actualizarUI() {
        document.getElementById('fecha').innerText = "ACTUALIZADO: " + tasas.fecha;
        document.getElementById('val-usd-ofic').innerText = tasas.oficial.usd;
        document.getElementById('val-eur-ofic').innerText = tasas.oficial.eur;
        document.getElementById('val-usd-inf').innerText = tasas.informal.usd;
        document.getElementById('val-eur-inf').innerText = tasas.informal.eur;
        calcular();
    }

    function calcular() {
        const cant = document.getElementById('cantidad').value || 0;
        const mon = document.getElementById('moneda').value;
        const merc = document.getElementById('mercado').value;

        if (tasas && tasas[merc]) {
            const valorTasa = parseFloat(tasas[merc][mon].replace(',', ''));
            const total = (parseFloat(cant) * valorTasa);
            document.getElementById('resultado').innerText = total.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    }

    cargarTasas();
</script>

</body>
</html>
